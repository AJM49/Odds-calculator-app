<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Horse Odds Calculator</title>
  <link rel="stylesheet" href="style.css" />

  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script type="module" src="login.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
    }
    .form-section {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 8px;
      display: none;
    }
    .form-section.active {
      display: block;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    .logout-btn {
      background-color: #f44336;
    }
    .logout-btn:hover {
      background-color: #da190b;
    }
    #toggleText {
      text-align: center;
      margin-top: 15px;
    }
    #toggleText a {
      color: #4CAF50;
      text-decoration: none;
      cursor: pointer;
    }
    #toggleText a:hover {
      text-decoration: underline;
    }
    #logoutSection {
      display: none;
      text-align: center;
    }
    .user-info {
      margin-bottom: 20px;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>🐎 Horse Odds Calculator</h2>
  
  <!-- Auth Section (Login/Signup) -->
  <div id="authSection">
    <!-- Login Form -->
    <div id="loginForm" class="form-section active">
      <h3>Login</h3>
      <input type="email" id="email" placeholder="Email" /><br />
      <input type="password" id="password" placeholder="Password" /><br />
      <button onclick="login()">Log In</button>
    </div>

    <!-- Sign Up Form -->
    <div id="signupForm" class="form-section">
      <h3>Create Account</h3>
      <input type="email" id="signupEmail" placeholder="Email" /><br />
      <input type="password" id="signupPassword" placeholder="Password" /><br />
      <input type="password" id="confirmPassword" placeholder="Confirm Password" /><br />
      <button onclick="signup()">Sign Up</button>
    </div>

    <div id="toggleText">
      Don't have an account? <a href="#" onclick="toggleSignup()">Sign Up</a>
    </div>
  </div>

  <!-- Logout Section -->
  <div id="logoutSection">
    <div class="user-info">
      <p>Logged in as: <strong id="userEmail"></strong></p>
    </div>
    <button onclick="window.location.href='index.html'" style="background-color: #2196F3;">Go to Calculator</button>
    <button onclick="logout()" class="logout-btn">Log Out</button>
  </div>
</body>
</html>

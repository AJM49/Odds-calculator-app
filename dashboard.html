<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horse Odds Calculator - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- Dashboard Header -->
  <div class="dashboard-header">
    <div class="header-top">
      <h1>My Betting Dashboard</h1>
      <div class="header-buttons">
        <button id="backBtn" class="back-btn" title="Back to calculator">← Back</button>
        <button id="refreshBtn" class="refresh-btn" title="Refresh bets">↻ Refresh</button>
        <button id="logoutBtn" class="logout-btn">Sign Out</button>
      </div>
    </div>
    <p id="dashboardStatus">Checking sign-in…</p>
  </div>

  <!-- Summary Stats -->
  <div class="stats-container">
    <div class="stat-card">
      <h2>Total Bets</h2>
      <p id="totalBets">0</p>
    </div>
    <div class="stat-card">
      <h2>Total Winnings</h2>
      <p id="totalWinnings">$0.00</p>
    </div>
    <div class="stat-card">
      <h2>Win Rate</h2>
      <p id="winRate">0%</p>
    </div>
  </div>

  <!-- Bet History Table -->
  <table>
  <thead>
    <tr>
      <th>Horse Name</th>
      <th>Track Name</th>
      <th>Bet Type</th>
      <th>Amount</th>
      <th>Result</th>
      <th>Winnings</th>
    </tr>
  </thead>
  <tbody id="betsTableBody"></tbody>
  </table>

  <!-- Dashboard Logic (Firebase is imported as a module within dashboard.js) -->
  <script type="module" src="dashboard.js"></script>

</body>
</html>

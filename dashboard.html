<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horse Odds Calculator - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <!-- Dashboard Header -->
  <div class="dashboard-header">
    <h1>My Betting Dashboard</h1>
    <p id="dashboardStatus">Checking sign-in…</p>
  </div>

  <!-- Summary Stats -->
  <div class="stats-container">
    <div class="stat-card">
      <h2>Total Bets</h2>
      <p id="totalBets">0</p>
    </div>
    <div class="stat-card">
      <h2>Total Winnings</h2>
      <p id="totalWinnings">$0.00</p>
    </div>
    <div class="stat-card">
      <h2>Win Rate</h2>
      <p id="winRate">0%</p>
    </div>
  </div>

  <!-- Bet History Table -->
  <table>
  <thead>
    <tr>
      <th>Horse Name</th>
      <th>Track Name</th>
      <th>Bet Type</th>
      <th>Amount</th>
      <th>Result</th>
      <th>Winnings</th>
    </tr>
  </thead>
  <tbody id="betsTableBody"></tbody>
  </table>

  <!-- Firebase -->
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

  <!-- Dashboard Logic -->
  <script type="module" src="dashboard.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Horse Odds Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h1>🐎 Admin Dashboard</h1>
  <div id="adminStatus">Checking admin access...</div>
  <div id="adminContent" style="display:none;">

    <section id="dashboardCards" style="display: flex; gap: 20px; flex-wrap: wrap;">
  <div class="card">
    <h3>Total Users</h3>
    <p id="totalUsers">0</p>
  </div>
  <div class="card">
    <h3>Total Bets</h3>
    <p id="totalBets">0</p>
  </div>
  <div class="card">
    <h3>Total Wagered</h3>
    <p id>


    <h2>👤 Users</h2>
    <table id="usersTable" border="1">
      <thead>
        <tr>
          <th>Email</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>🧾 Bets</h2>
    <table id="betsTable" border="1">
      <thead>
        <tr>
          <th>User ID</th>
          <th>Bet Type</th>
          <th>Amount</th>
          <th>Odds</th>
          <th>Result</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>

  <script type="module" src="admin.js"></script>
</body>
</html>

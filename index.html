<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HorseCalc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f2a44;
      color: #fff;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      font-weight: bold;
    }

    .hero {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .hero-card {
      flex: 1;
      background: #1e4b7a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .section {
      padding: 10px;
    }

    .race-card {
      background: #fff;
      color: #000;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #0c2236;
      padding: 10px 0;
    }

    #betBuilder {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #fff;
      color: #000;
      padding: 15px;
      border-radius: 12px 12px 0 0;
    }

    .horse-btn {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="header">
  <div>HorseCalc</div>
  <div>$0.00</div>
</div>

<div class="hero">
  <div class="hero-card" onclick="openCalculator()">Quick Bet</div>
  <div class="hero-card">Picks</div>
</div>

<div class="section">
  <h3>Upcoming Races</h3>

  <div class="race-card" onclick="selectRace('Tampa',1)">
    Tampa Bay Downs - Race 1
  </div>

  <div class="race-card" onclick="selectRace('Parx',3)">
    Parx Racing - Race 3
  </div>

</div>

<div class="bottom-nav">
  <div onclick="goHome()">Home</div>
  <div onclick="openCalculator()">Calculator</div>
  <div>Bets</div>
  <div>History</div>
</div>

<script src="app.js"></script>

</body>
</html>
